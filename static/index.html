<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<meta name="version" content="v23-2026-02-28"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>FreightTrack Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0f1e;
  --bg2:#0f1629;
  --bg3:#151d35;
  --card:#1a2240;
  --card2:#1f2a4a;
  --border:#2a3a5c;
  --accent:#4f8ef7;
  --accent2:#6c63ff;
  --green:#22c55e;
  --yellow:#f59e0b;
  --red:#ef4444;
  --orange:#f97316;
  --cyan:#06b6d4;
  --text:#e8eaf6;
  --text2:#8892b0;
  --text3:#4a5568;
  --radius:12px;
  --shadow:0 8px 32px rgba(0,0,0,.4);
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ── Layout ── */
.app{display:flex;min-height:100vh}

/* ── Sidebar ── */
.sidebar{
  width:240px;min-width:240px;background:var(--bg2);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  position:sticky;top:0;height:100vh;
  transition:width .3s;
}
.sidebar-logo{
  padding:24px 20px 16px;
  display:flex;align-items:center;gap:12px;
  border-bottom:1px solid var(--border);
}
.logo-icon{
  width:38px;height:38px;border-radius:10px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
}
.logo-text{font-size:15px;font-weight:700;letter-spacing:.3px}
.logo-sub{font-size:11px;color:var(--text2);margin-top:1px}

.nav{flex:1;padding:16px 12px;overflow-y:auto}
.nav-section{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:1.2px;
  text-transform:uppercase;padding:8px 8px 4px;margin-top:8px}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:10px 12px;
  border-radius:8px;cursor:pointer;font-size:13.5px;font-weight:500;
  color:var(--text2);transition:all .2s;margin-bottom:2px;text-decoration:none;
}
.nav-item:hover{background:var(--card);color:var(--text)}
.nav-item.active{background:linear-gradient(135deg,rgba(79,142,247,.15),rgba(108,99,255,.15));
  color:var(--accent);border:1px solid rgba(79,142,247,.2)}
.nav-item i{width:18px;text-align:center;font-size:14px}
.nav-badge{
  margin-left:auto;background:var(--accent);color:#fff;
  font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;
}

.sidebar-bottom{padding:12px;border-top:1px solid var(--border)}
.sidebar-user{
  display:flex;align-items:center;gap:10px;padding:10px 12px;
  border-radius:8px;background:var(--card);
}
.avatar{
  width:32px;height:32px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;flex-shrink:0;
}
.user-info .name{font-size:13px;font-weight:600}
.user-info .role{font-size:11px;color:var(--text2)}

/* ── Main ── */
.main{flex:1;display:flex;flex-direction:column;min-width:0}

/* ── Topbar ── */
.topbar{
  height:60px;background:var(--bg2);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 24px;gap:16px;
  position:sticky;top:0;z-index:100;
}
.topbar-title{font-size:17px;font-weight:700;flex:1}
.topbar-sub{font-size:12px;color:var(--text2);margin-top:1px}
.search-box{
  display:flex;align-items:center;gap:8px;
  background:var(--card);border:1px solid var(--border);
  border-radius:8px;padding:7px 14px;min-width:220px;
}
.search-box input{background:none;border:none;outline:none;color:var(--text);font-size:13px;width:100%}
.search-box i{color:var(--text2);font-size:13px}
.btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;
  cursor:pointer;border:none;transition:all .2s;white-space:nowrap;
}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.btn-primary:hover{opacity:.88;transform:translateY(-1px)}
.btn-secondary{background:var(--card2);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--card);border-color:var(--accent)}
.btn-ghost{background:none;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{color:var(--text);border-color:var(--text2)}
.btn-danger{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.btn-danger:hover{background:rgba(239,68,68,.2)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-icon{width:34px;height:34px;padding:0;justify-content:center;border-radius:8px}

/* ── Content ── */
.content{padding:24px;flex:1;overflow-y:auto}

/* ── Page sections ── */
.page{display:none}.page.active{display:block}

/* ── Stats Grid ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.stat-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);padding:20px;
  display:flex;align-items:center;gap:16px;
  transition:transform .2s,border-color .2s;
}
.stat-card:hover{transform:translateY(-2px);border-color:var(--accent)}
.stat-icon{
  width:48px;height:48px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;
}
.stat-icon.blue{background:rgba(79,142,247,.15);color:var(--accent)}
.stat-icon.green{background:rgba(34,197,94,.15);color:var(--green)}
.stat-icon.orange{background:rgba(249,115,22,.15);color:var(--orange)}
.stat-icon.red{background:rgba(239,68,68,.15);color:var(--red)}
.stat-icon.cyan{background:rgba(6,182,212,.15);color:var(--cyan)}
.stat-icon.purple{background:rgba(108,99,255,.15);color:var(--accent2)}
.stat-value{font-size:26px;font-weight:700;line-height:1}
.stat-label{font-size:12px;color:var(--text2);margin-top:4px}
.stat-change{font-size:11px;margin-top:6px}
.stat-change.up{color:var(--green)}
.stat-change.down{color:var(--red)}

/* ── Table ── */
.table-wrap{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;
}
.table-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px;border-bottom:1px solid var(--border);gap:12px;flex-wrap:wrap;
}
.table-title{font-size:15px;font-weight:700}
.filters{display:flex;gap:8px;flex-wrap:wrap}
select.filter{
  background:var(--card2);border:1px solid var(--border);color:var(--text);
  border-radius:8px;padding:6px 12px;font-size:12px;outline:none;cursor:pointer;
}
select.filter:focus{border-color:var(--accent)}
table{width:100%;border-collapse:collapse}
th{
  background:var(--bg3);color:var(--text2);font-size:11px;font-weight:600;
  text-transform:uppercase;letter-spacing:.8px;padding:12px 16px;text-align:left;
  white-space:nowrap;
}
td{padding:13px 16px;font-size:13px;border-top:1px solid rgba(42,58,92,.5);vertical-align:middle}
tr:hover td{background:rgba(79,142,247,.04)}
tr.clickable{cursor:pointer}

/* ── Badges ── */
.badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;
}
.badge::before{content:'';width:5px;height:5px;border-radius:50%}
.badge-pending{background:rgba(245,158,11,.12);color:var(--yellow)}.badge-pending::before{background:var(--yellow)}
.badge-sailing,.badge-transit{background:rgba(79,142,247,.12);color:var(--accent)}.badge-sailing::before,.badge-transit::before{background:var(--accent)}
.badge-arrived,.badge-delivered{background:rgba(34,197,94,.12);color:var(--green)}.badge-arrived::before,.badge-delivered::before{background:var(--green)}
.badge-delayed{background:rgba(239,68,68,.12);color:var(--red)}.badge-delayed::before{background:var(--red)}
.badge-discharged{background:rgba(6,182,212,.12);color:var(--cyan)}.badge-discharged::before{background:var(--cyan)}
.badge-ocean{background:rgba(79,142,247,.1);color:var(--accent)}
.badge-air{background:rgba(108,99,255,.1);color:var(--accent2)}
.badge-mode::before{display:none}

/* ── Actions cell ── */
.actions{display:flex;gap:6px;opacity:0;transition:opacity .2s}
tr:hover .actions{opacity:1}

/* ── Modal ── */
.overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);
  backdrop-filter:blur(4px);z-index:1000;
  align-items:center;justify-content:center;padding:20px;
}
.overlay.open{display:flex}
.modal{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:16px;width:100%;max-width:640px;max-height:90vh;
  overflow-y:auto;box-shadow:var(--shadow);
  animation:slideUp .25s ease;
}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.modal-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 24px;border-bottom:1px solid var(--border);
}
.modal-title{font-size:17px;font-weight:700}
.modal-close{
  width:30px;height:30px;border-radius:8px;background:var(--card);
  border:none;color:var(--text2);cursor:pointer;font-size:16px;
  display:flex;align-items:center;justify-content:center;
}
.modal-close:hover{color:var(--text);background:var(--card2)}
.modal-body{padding:24px}
.modal-foot{
  display:flex;justify-content:flex-end;gap:10px;
  padding:16px 24px;border-top:1px solid var(--border);
}

/* ── Form ── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group.full{grid-column:1/-1}
label{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.form-control{
  background:var(--card);border:1px solid var(--border);
  border-radius:8px;padding:10px 14px;color:var(--text);
  font-size:13px;outline:none;transition:border-color .2s;
  font-family:inherit;
}
.form-control:focus{border-color:var(--accent);background:var(--card2)}
.form-control::placeholder{color:var(--text3)}
textarea.form-control{resize:vertical;min-height:80px}

/* ── Detail panel ── */
.detail-modal{max-width:760px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.detail-item{background:var(--bg3);border-radius:10px;padding:14px 16px}
.detail-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
.detail-value{font-size:14px;font-weight:500}
.events-list{display:flex;flex-direction:column;gap:0}
.event-item{
  display:flex;gap:16px;padding:12px 0;
  border-bottom:1px solid rgba(42,58,92,.5);
}
.event-item:last-child{border:none}
.event-dot{
  width:10px;height:10px;border-radius:50%;
  background:var(--accent);margin-top:4px;flex-shrink:0;
}
.event-time{font-size:11px;color:var(--text2);margin-top:2px}

/* ── Toast ── */
#toast-wrap{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{
  display:flex;align-items:center;gap:12px;
  background:var(--card2);border:1px solid var(--border);
  border-radius:10px;padding:12px 16px;min-width:260px;
  box-shadow:var(--shadow);animation:fadeIn .3s ease;
  font-size:13px;font-weight:500;
}
.toast.success{border-left:3px solid var(--green)}
.toast.error{border-left:3px solid var(--red)}
.toast.info{border-left:3px solid var(--accent)}
.toast i{font-size:15px}
.toast.success i{color:var(--green)}
.toast.error i{color:var(--red)}
.toast.info i{color:var(--accent)}
@keyframes fadeIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

/* ── Loading ── */
.spinner{
  display:inline-block;width:14px;height:14px;
  border:2px solid rgba(255,255,255,.3);border-top-color:#fff;
  border-radius:50%;animation:spin .6s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.skeleton{background:linear-gradient(90deg,var(--card) 25%,var(--card2) 50%,var(--card) 75%);
  background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px}
@keyframes shimmer{0%{background-position:200%}100%{background-position:-200%}}

/* ── Empty state ── */
.empty{
  text-align:center;padding:60px 20px;
}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:.3}
.empty-title{font-size:18px;font-weight:700;margin-bottom:8px}
.empty-sub{font-size:13px;color:var(--text2)}

/* ── Tabs ── */
.tabs{display:flex;gap:4px;padding:4px;background:var(--bg3);border-radius:10px;width:fit-content;margin-bottom:20px}
.tab{padding:7px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;color:var(--text2);transition:all .2s}
.tab.active{background:var(--card2);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.3)}

/* ── Section title ── */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.section-title{font-size:20px;font-weight:700}
.section-sub{font-size:13px;color:var(--text2);margin-top:2px}

/* ── Responsive ── */
@media(max-width:900px){
  .sidebar{display:none}
  .form-grid{grid-template-columns:1fr}
  .detail-grid{grid-template-columns:1fr}
  .stats-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:500px){
  .stats-grid{grid-template-columns:1fr}
  .search-box{display:none}
}

/* ── Recent table short ── */
.ref-cell{font-weight:600;color:var(--accent)}
.client-cell{color:var(--text2);font-size:12px}
.route-cell{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2)}
.route-cell span{color:var(--text);font-weight:500}

/* ── Copy link ── */
.copy-link{
  display:inline-flex;align-items:center;gap:6px;font-size:12px;
  color:var(--accent);cursor:pointer;text-decoration:none;
}
.copy-link:hover{text-decoration:underline}

/* ── Progress bar ── */
.progress-wrap{background:var(--bg3);border-radius:4px;height:6px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:4px;transition:width .5s}

/* ── Map placeholder ── */
.map-box{background:var(--bg3);border:1px solid var(--border);border-radius:12px;height:280px;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:13px;margin-bottom:16px}
</style>
</head>
<body>
<div id="toast-wrap"></div>
<div style="position:fixed;bottom:8px;left:12px;font-size:10px;color:#2a3a5c;z-index:1;user-select:none;">v23</div>

<!-- ═══════════════════════════════ APP ═══════════════════════════════ -->
<div class="app">

<!-- SIDEBAR -->
<nav class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">🚢</div>
    <div>
      <div class="logo-text">FreightTrack</div>
      <div class="logo-sub">Pro Dashboard</div>
    </div>
  </div>
  <div class="nav">
    <div class="nav-section">Main</div>
    <div class="nav-item active" onclick="showPage('dashboard',this)">
      <i class="fa fa-chart-pie"></i> Overview
    </div>
    <div class="nav-item" onclick="showPage('shipments',this)">
      <i class="fa fa-boxes-stacked"></i> Shipments
      <span class="nav-badge" id="nav-count">0</span>
    </div>
    <div class="nav-section">Tracking</div>
    <div class="nav-item" onclick="showPage('map',this)">
      <i class="fa fa-earth-africa"></i> Live Map
    </div>
    <div class="nav-section">Tools</div>
    <div class="nav-item" onclick="exportXLSX()">
      <i class="fa fa-file-excel"></i> Export XLSX
    </div>
    <div class="nav-item" onclick="trackAll()">
      <i class="fa fa-rotate"></i> Sync All
    </div>
  </div>
  <div class="sidebar-bottom">
    <div class="sidebar-user">
      <div class="avatar">A</div>
      <div class="user-info">
        <div class="name">Admin</div>
        <div class="role">Freight Agent</div>
      </div>
    </div>
  </div>
</nav>

<!-- MAIN -->
<div class="main">

  <!-- TOPBAR -->
  <div class="topbar">
    <div style="flex:1">
      <div class="topbar-title" id="page-title">Overview</div>
    </div>
    <div class="search-box">
      <i class="fa fa-magnifying-glass"></i>
      <input id="global-search" placeholder="Search shipments…" oninput="onSearch(this.value)"/>
    </div>
    <button class="btn btn-primary" onclick="openModal('modal-add');editId=null;resetForm()">
      <i class="fa fa-plus"></i> New Shipment
    </button>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <!-- ─── DASHBOARD PAGE ─── -->
    <div class="page active" id="page-dashboard">

      <!-- Stats -->
      <div class="stats-grid" id="stats-grid">
        <div class="stat-card"><div class="stat-icon blue"><i class="fa fa-ship"></i></div><div><div class="stat-value skeleton" style="width:40px;height:28px"></div><div class="stat-label">Total Shipments</div></div></div>
        <div class="stat-card"><div class="stat-icon orange"><i class="fa fa-anchor"></i></div><div><div class="stat-value skeleton" style="width:40px;height:28px"></div><div class="stat-label">In Transit</div></div></div>
        <div class="stat-card"><div class="stat-icon green"><i class="fa fa-circle-check"></i></div><div><div class="stat-value skeleton" style="width:40px;height:28px"></div><div class="stat-label">Delivered</div></div></div>
        <div class="stat-card"><div class="stat-icon red"><i class="fa fa-triangle-exclamation"></i></div><div><div class="stat-value skeleton" style="width:40px;height:28px"></div><div class="stat-label">Delayed</div></div></div>
      </div>

      <!-- Recent Shipments -->
      <div class="table-wrap">
        <div class="table-header">
          <div class="table-title">Recent Shipments</div>
          <button class="btn btn-secondary btn-sm" onclick="showPage('shipments',document.querySelector('[onclick*=shipments]'))">
            View All <i class="fa fa-arrow-right"></i>
          </button>
        </div>
        <div id="recent-table"></div>
      </div>
    </div>

    <!-- ─── SHIPMENTS PAGE ─── -->
    <div class="page" id="page-shipments">
      <div class="section-header">
        <div>
          <div class="section-title">All Shipments</div>
          <div class="section-sub" id="ship-count-label">Loading…</div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <select class="filter" id="fil-status" onchange="loadShipments()">
            <option value="">All Status</option>
            <option>Pending</option><option>Sailing</option><option>Transit</option>
            <option>Arrived</option><option>Discharged</option><option>Delivered</option>
            <option>Delayed</option>
          </select>
          <select class="filter" id="fil-mode" onchange="loadShipments()">
            <option value="">All Modes</option>
            <option>Ocean</option><option>Air</option>
          </select>
          <button class="btn btn-primary btn-sm" onclick="openModal('modal-add');editId=null;resetForm()">
            <i class="fa fa-plus"></i> Add
          </button>
        </div>
      </div>
      <div class="table-wrap">
        <div id="ship-table"></div>
      </div>
    </div>

    <!-- ─── MAP PAGE ─── -->
    <div class="page" id="page-map">
      <div class="section-header">
        <div class="section-title">Live Map</div>
      </div>
      <div class="map-box"><i class="fa fa-map-location-dot" style="font-size:32px;margin-right:12px"></i> Select a shipment to view its route</div>
    </div>

  </div><!-- /content -->
</div><!-- /main -->
</div><!-- /app -->

<!-- ════════════════════ MODALS ════════════════════ -->

<!-- ADD/EDIT SHIPMENT -->
<div class="overlay" id="modal-add">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="modal-add-title">New Shipment</div>
      <button class="modal-close" onclick="closeModal('modal-add')"><i class="fa fa-xmark"></i></button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group">
          <label>Reference *</label>
          <input id="f-ref" class="form-control" placeholder="e.g. AQUA034"/>
        </div>
        <div class="form-group">
          <label>Mode</label>
          <select id="f-mode" class="form-control">
            <option>Ocean</option><option>Air</option>
          </select>
        </div>
        <div class="form-group">
          <label>Container / AWB</label>
          <input id="f-ref2" class="form-control" placeholder="MSCU1234567"/>
        </div>
        <div class="form-group">
          <label>Booking Number</label>
          <input id="f-booking" class="form-control" placeholder="MRO1002308"/>
        </div>
        <div class="form-group">
          <label>Carrier / SCAC</label>
          <input id="f-carrier" class="form-control" placeholder="CMA, MSC…"/>
        </div>
        <div class="form-group">
          <label>Client Name</label>
          <input id="f-client" class="form-control" placeholder="Client company"/>
        </div>
        <div class="form-group full">
          <label>Client Email (for alerts)</label>
          <input id="f-client-email" class="form-control" type="email" placeholder="client@example.com"/>
        </div>
        <div class="form-group">
          <label>Port of Loading</label>
          <input id="f-pol" class="form-control" placeholder="SHANGHAI"/>
        </div>
        <div class="form-group">
          <label>Port of Discharge</label>
          <input id="f-pod" class="form-control" placeholder="CASABLANCA"/>
        </div>
        <div class="form-group">
          <label>ETD</label>
          <input id="f-etd" class="form-control" type="date"/>
        </div>
        <div class="form-group">
          <label>ETA</label>
          <input id="f-eta" class="form-control" type="date"/>
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="f-status" class="form-control">
            <option>Pending</option><option>Sailing</option><option>Transit</option>
            <option>Arrived</option><option>Discharged</option><option>Delivered</option>
            <option>Delayed</option>
          </select>
        </div>
        <div class="form-group full">
          <label>Notes</label>
          <textarea id="f-note" class="form-control" placeholder="Internal notes…"></textarea>
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal('modal-add')">Cancel</button>
      <button class="btn btn-primary" id="btn-save" onclick="saveShipment()">
        <i class="fa fa-floppy-disk"></i> Save Shipment
      </button>
    </div>
  </div>
</div>

<!-- DETAIL -->
<div class="overlay" id="modal-detail">
  <div class="modal detail-modal">
    <div class="modal-head">
      <div>
        <div class="modal-title" id="detail-title">Shipment Details</div>
        <div style="font-size:12px;color:var(--text2);margin-top:2px" id="detail-sub"></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="btn btn-secondary btn-sm" id="detail-track-btn" onclick="trackOne()">
          <i class="fa fa-rotate"></i> Track
        </button>
        <button class="modal-close" onclick="closeModal('modal-detail')"><i class="fa fa-xmark"></i></button>
      </div>
    </div>
    <div class="modal-body" id="detail-body"></div>
  </div>
</div>

<!-- ════════════════════ JS ════════════════════ -->
<script>
let editId = null;
let currentDetailId = null;
let allShipments = [];

// ── Navigation ────────────────────────────────────────────────────────────────
function showPage(id, el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  if(el) el.classList.add('active');
  const titles={dashboard:'Overview',shipments:'All Shipments',map:'Live Map'};
  document.getElementById('page-title').textContent = titles[id]||id;
  if(id==='shipments') loadShipments();
}

// ── API ───────────────────────────────────────────────────────────────────────
async function apiFetch(url, options={}){
  const defaultHeaders = {'Content-Type':'application/json','Accept':'application/json'};
  const merged = {...options, headers:{...defaultHeaders,...(options.headers||{})}};
  let res;
  try{ res = await fetch(url, merged); }
  catch(e){ throw new Error('Network error: '+e.message); }
  if(!res.ok){
    let msg = `HTTP ${res.status}`;
    try{ const b=await res.json(); msg=b.detail||b.message||JSON.stringify(b); }catch{ msg=await res.text().catch(()=>msg); }
    throw new Error(msg);
  }
  const txt = await res.text();
  return txt ? JSON.parse(txt) : {};
}

// ── Toast ──────────────────────────────────────────────────────────────────────
function toast(msg, type='info'){
  const icons={success:'fa-circle-check',error:'fa-circle-xmark',info:'fa-circle-info'};
  const t=document.createElement('div');
  t.className=`toast ${type}`;
  t.innerHTML=`<i class="fa ${icons[type]||icons.info}"></i><span>${msg}</span>`;
  document.getElementById('toast-wrap').appendChild(t);
  setTimeout(()=>t.remove(),4000);
}

// ── Modal ────────────────────────────────────────────────────────────────────
function openModal(id){ document.getElementById(id).classList.add('open'); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.overlay').forEach(o=>{
  o.addEventListener('click',e=>{ if(e.target===o) o.classList.remove('open'); });
});

// ── Helpers ───────────────────────────────────────────────────────────────────
function resetForm(){
  ['f-ref','f-ref2','f-booking','f-carrier','f-client','f-client-email',
   'f-pol','f-pod','f-etd','f-eta','f-note'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.value='';
  });
  const fm=document.getElementById('f-mode'); if(fm) fm.value='Ocean';
  const fs=document.getElementById('f-status'); if(fs) fs.value='Pending';
  document.getElementById('modal-add-title').textContent='New Shipment';
  editId=null;
}

function statusBadge(s){
  const map={Pending:'pending',Sailing:'sailing',Transit:'transit',
    Arrived:'arrived',Delivered:'delivered',Delayed:'delayed',Discharged:'discharged'};
  return `<span class="badge badge-${map[s]||'pending'}">${s||'Pending'}</span>`;
}
function modeBadge(m){
  return `<span class="badge badge-mode badge-${(m||'ocean').toLowerCase()}">${m||'Ocean'}</span>`;
}
function fmt(d){ if(!d) return '—'; return d.split('T')[0]; }

// ── Search ───────────────────────────────────────────────────────────────────
function onSearch(val){
  if(document.getElementById('page-shipments').classList.contains('active'))
    renderShipTable(allShipments.filter(s=>
      (s.ref+s.client+s.carrier+s.ref2+s.booking_no).toLowerCase().includes(val.toLowerCase())
    ));
}

// ── Dashboard ────────────────────────────────────────────────────────────────
async function loadDashboard(){
  try{
    const stats=await apiFetch('/api/stats');
    const bs=stats.by_status||{};
    const transit=(bs.Sailing||0)+(bs.Transit||0);
    const delivered=(bs.Delivered||0)+(bs.Arrived||0)+(bs.Discharged||0);
    document.getElementById('stats-grid').innerHTML=`
      <div class="stat-card">
        <div class="stat-icon blue"><i class="fa fa-ship"></i></div>
        <div><div class="stat-value">${stats.total||0}</div><div class="stat-label">Total Shipments</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon orange"><i class="fa fa-anchor"></i></div>
        <div><div class="stat-value">${transit}</div><div class="stat-label">In Transit</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon green"><i class="fa fa-circle-check"></i></div>
        <div><div class="stat-value">${delivered}</div><div class="stat-label">Delivered</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon red"><i class="fa fa-triangle-exclamation"></i></div>
        <div><div class="stat-value">${stats.delayed_count||0}</div><div class="stat-label">Delayed</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon cyan"><i class="fa fa-plane-departure"></i></div>
        <div><div class="stat-value">${bs.Pending||0}</div><div class="stat-label">Pending</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon purple"><i class="fa fa-water"></i></div>
        <div><div class="stat-value">${(stats.by_mode||{}).Ocean||0}</div><div class="stat-label">Ocean</div></div>
      </div>
    `;
    document.getElementById('nav-count').textContent=stats.total||0;
  }catch(e){ console.error(e); }

  try{
    const ships=await apiFetch('/api/shipments');
    allShipments=ships;
    const recent=ships.slice(0,8);
    if(!recent.length){
      document.getElementById('recent-table').innerHTML=`
        <div class="empty"><div class="empty-icon">📦</div>
        <div class="empty-title">No shipments yet</div>
        <div class="empty-sub">Click "New Shipment" to add your first one</div></div>`;
      return;
    }
    document.getElementById('recent-table').innerHTML=`
      <table><thead><tr>
        <th>Reference</th><th>Client</th><th>Route</th><th>Mode</th>
        <th>ETA</th><th>Status</th><th></th>
      </tr></thead><tbody>
      ${recent.map(s=>`
        <tr class="clickable" onclick="openDetail(${s.id})">
          <td class="ref-cell">${s.ref}<br><span style="font-weight:400;color:var(--text2);font-size:11px">${s.ref2||''}</span></td>
          <td class="client-cell">${s.client||'—'}</td>
          <td><div class="route-cell"><span>${s.pol||'—'}</span><i class="fa fa-arrow-right" style="font-size:10px"></i><span>${s.pod||'—'}</span></div></td>
          <td>${modeBadge(s.mode)}</td>
          <td style="font-size:12px">${fmt(s.eta)}</td>
          <td>${statusBadge(s.status)}</td>
          <td><div class="actions">
            <button class="btn btn-secondary btn-sm btn-icon" onclick="event.stopPropagation();editShipment(${s.id})" title="Edit"><i class="fa fa-pen"></i></button>
            <button class="btn btn-danger btn-sm btn-icon" onclick="event.stopPropagation();deleteShipment(${s.id})" title="Delete"><i class="fa fa-trash"></i></button>
          </div></td>
        </tr>`).join('')}
      </tbody></table>`;
  }catch(e){ console.error(e); }
}

// ── Shipments Page ────────────────────────────────────────────────────────────
async function loadShipments(){
  const status=document.getElementById('fil-status')?.value||'';
  const mode=document.getElementById('fil-mode')?.value||'';
  const search=document.getElementById('global-search')?.value||'';
  try{
    const ships=await apiFetch(`/api/shipments?search=${encodeURIComponent(search)}&status=${encodeURIComponent(status)}&mode=${encodeURIComponent(mode)}`);
    allShipments=ships;
    document.getElementById('ship-count-label').textContent=`${ships.length} shipment${ships.length!==1?'s':''} found`;
    renderShipTable(ships);
  }catch(e){ toast(e.message,'error'); }
}

function renderShipTable(ships){
  const wrap=document.getElementById('ship-table');
  if(!ships.length){
    wrap.innerHTML=`<div class="empty"><div class="empty-icon">🔍</div>
      <div class="empty-title">No shipments found</div>
      <div class="empty-sub">Try adjusting your filters</div></div>`;
    return;
  }
  wrap.innerHTML=`
    <table><thead><tr>
      <th>Reference</th><th>Container/AWB</th><th>Client</th>
      <th>Carrier</th><th>Route</th><th>Mode</th>
      <th>ETD</th><th>ETA</th><th>Status</th><th></th>
    </tr></thead><tbody>
    ${ships.map(s=>`
      <tr class="clickable" onclick="openDetail(${s.id})">
        <td class="ref-cell">${s.ref}</td>
        <td style="font-size:12px;color:var(--text2)">${s.ref2||'—'}</td>
        <td class="client-cell">${s.client||'—'}</td>
        <td style="font-size:12px">${s.carrier||'—'}</td>
        <td><div class="route-cell"><span>${s.pol||'—'}</span><i class="fa fa-arrow-right" style="font-size:10px"></i><span>${s.pod||'—'}</span></div></td>
        <td>${modeBadge(s.mode)}</td>
        <td style="font-size:12px">${fmt(s.etd)}</td>
        <td style="font-size:12px">${fmt(s.eta)}</td>
        <td>${statusBadge(s.status)}</td>
        <td><div class="actions">
          <button class="btn btn-secondary btn-sm btn-icon" onclick="event.stopPropagation();editShipment(${s.id})" title="Edit"><i class="fa fa-pen"></i></button>
          <button class="btn btn-danger btn-sm btn-icon" onclick="event.stopPropagation();deleteShipment(${s.id})" title="Delete"><i class="fa fa-trash"></i></button>
        </div></td>
      </tr>`).join('')}
    </tbody></table>`;
}

// ── Detail ────────────────────────────────────────────────────────────────────
async function openDetail(sid){
  currentDetailId=sid;
  openModal('modal-detail');
  document.getElementById('detail-body').innerHTML=`<div style="text-align:center;padding:40px"><div class="spinner" style="width:32px;height:32px;border-width:3px"></div></div>`;
  try{
    const s=await apiFetch(`/api/shipments/${sid}`);
    document.getElementById('detail-title').textContent=s.ref;
    document.getElementById('detail-sub').textContent=`${s.client||''} · ${s.carrier||''} · ${s.mode}`;
    const trackLink=`${location.origin}/track/${s.ref}`;
    document.getElementById('detail-body').innerHTML=`
      <div class="detail-grid">
        <div class="detail-item"><div class="detail-label">Status</div><div class="detail-value">${statusBadge(s.status)}</div></div>
        <div class="detail-item"><div class="detail-label">Mode</div><div class="detail-value">${modeBadge(s.mode)}</div></div>
        <div class="detail-item"><div class="detail-label">Container / AWB</div><div class="detail-value">${s.ref2||'—'}</div></div>
        <div class="detail-item"><div class="detail-label">Booking No</div><div class="detail-value">${s.booking_no||'—'}</div></div>
        <div class="detail-item"><div class="detail-label">Carrier</div><div class="detail-value">${s.carrier||'—'}</div></div>
        <div class="detail-item"><div class="detail-label">Vessel</div><div class="detail-value">${s.vessel||'—'}</div></div>
        <div class="detail-item"><div class="detail-label">POL → POD</div><div class="detail-value">${s.pol||'—'} → ${s.pod||'—'}</div></div>
        <div class="detail-item"><div class="detail-label">ETD / ETA</div><div class="detail-value">${fmt(s.etd)} → ${fmt(s.eta)}</div></div>
        <div class="detail-item"><div class="detail-label">Client</div><div class="detail-value">${s.client||'—'}</div></div>
        <div class="detail-item"><div class="detail-label">Last Tracked</div><div class="detail-value" style="font-size:12px">${s.last_tracked?fmt(s.last_tracked):'Never'}</div></div>
        <div class="detail-item" style="grid-column:1/-1">
          <div class="detail-label">Client Tracking Link</div>
          <div class="detail-value">
            <a class="copy-link" onclick="copyLink('${trackLink}')">
              <i class="fa fa-link"></i> ${trackLink}
            </a>
          </div>
        </div>
        ${s.note?`<div class="detail-item" style="grid-column:1/-1"><div class="detail-label">Note</div><div class="detail-value" style="font-size:13px;color:var(--text2)">${s.note}</div></div>`:''}
      </div>
      ${s.events&&s.events.length?`
        <div style="font-size:13px;font-weight:700;margin-bottom:12px">
          <i class="fa fa-timeline" style="color:var(--accent);margin-right:8px"></i>Tracking Events
        </div>
        <div class="events-list">
          ${s.events.slice(0,8).map(e=>`
            <div class="event-item">
              <div class="event-dot"></div>
              <div>
                <div style="font-size:13px;font-weight:500">${e.description||'—'}</div>
                <div class="event-time">${e.location||''} · ${fmt(e.timestamp)}</div>
              </div>
            </div>`).join('')}
        </div>`:
        `<div style="text-align:center;padding:24px;color:var(--text2);font-size:13px">
          <i class="fa fa-satellite-dish" style="font-size:24px;margin-bottom:8px;display:block;opacity:.3"></i>
          No tracking events yet — click Track to fetch live data
        </div>`
      }
    `;
  }catch(e){ document.getElementById('detail-body').innerHTML=`<div class="empty"><div class="empty-title">Error</div><div class="empty-sub">${e.message}</div></div>`; }
}

function copyLink(url){
  navigator.clipboard.writeText(url).then(()=>toast('Link copied!','success'));
}

// ── Save ─────────────────────────────────────────────────────────────────────
async function saveShipment(){
  const ref = (document.getElementById('f-ref')?.value||'').trim();
  if(!ref){ toast('Reference is required','error'); return; }
  const btn=document.getElementById('btn-save');
  btn.innerHTML='<span class="spinner"></span> Saving…'; btn.disabled=true;
  const g=id=>{ const el=document.getElementById(id); return el?el.value.trim()||null:null; };
  const data={
    ref, ref2:g('f-ref2'), booking_no:g('f-booking'),
    mode:document.getElementById('f-mode')?.value||'Ocean',
    carrier:g('f-carrier'), client:g('f-client'), client_email:g('f-client-email'),
    pol:g('f-pol'), pod:g('f-pod'), etd:g('f-etd'), eta:g('f-eta'),
    status:document.getElementById('f-status')?.value||'Pending', note:g('f-note'),
  };
  try{
    let r;
    if(editId) r=await apiFetch(`/api/shipments/${editId}`,{method:'PATCH',body:JSON.stringify(data)});
    else r=await apiFetch('/api/shipments',{method:'POST',body:JSON.stringify(data)});
    if(r&&r.id){
      toast(editId?'Shipment updated ✅':'Shipment added ✅','success');
      closeModal('modal-add');
      loadDashboard(); loadShipments();
    } else { toast('Unexpected server response','error'); }
  }catch(e){ toast('❌ '+e.message,'error'); console.error(e); }
  btn.innerHTML='<i class="fa fa-floppy-disk"></i> Save Shipment'; btn.disabled=false;
}

// ── Edit ─────────────────────────────────────────────────────────────────────
async function editShipment(sid){
  try{
    const s=await apiFetch(`/api/shipments/${sid}`);
    editId=sid;
    document.getElementById('modal-add-title').textContent='Edit Shipment';
    const set=(id,v)=>{ const el=document.getElementById(id); if(el) el.value=v||''; };
    set('f-ref',s.ref); set('f-ref2',s.ref2); set('f-booking',s.booking_no);
    set('f-carrier',s.carrier); set('f-client',s.client);
    set('f-client-email',s.client_email); set('f-pol',s.pol); set('f-pod',s.pod);
    set('f-etd',s.etd?s.etd.split('T')[0]:'');
    set('f-eta',s.eta?s.eta.split('T')[0]:'');
    set('f-note',s.note);
    const fm=document.getElementById('f-mode'); if(fm) fm.value=s.mode||'Ocean';
    const fs=document.getElementById('f-status'); if(fs) fs.value=s.status||'Pending';
    openModal('modal-add');
  }catch(e){ toast(e.message,'error'); }
}

// ── Delete ────────────────────────────────────────────────────────────────────
async function deleteShipment(sid){
  if(!confirm('Delete this shipment?')) return;
  try{
    await apiFetch(`/api/shipments/${sid}`,{method:'DELETE'});
    toast('Deleted','success'); loadDashboard(); loadShipments();
  }catch(e){ toast(e.message,'error'); }
}

// ── Track ─────────────────────────────────────────────────────────────────────
async function trackOne(){
  if(!currentDetailId) return;
  const btn=document.getElementById('detail-track-btn');
  btn.innerHTML='<span class="spinner"></span> Tracking…'; btn.disabled=true;
  try{
    await apiFetch(`/api/shipments/${currentDetailId}/track`,{method:'POST'});
    toast('Tracking updated!','success'); openDetail(currentDetailId);
  }catch(e){ toast(e.message,'error'); }
  btn.innerHTML='<i class="fa fa-rotate"></i> Track'; btn.disabled=false;
}

async function trackAll(){
  toast('Syncing all shipments…','info');
  try{ await apiFetch('/api/track-all',{method:'POST'}); toast('Sync started!','success'); }
  catch(e){ toast(e.message,'error'); }
}

// ── Export ────────────────────────────────────────────────────────────────────
function exportXLSX(){
  window.open('/api/export/xlsx','_blank');
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadDashboard();
</script>
