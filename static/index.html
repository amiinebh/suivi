<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>FreightTrack Pro</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"><style>:root{--accent:#4f8ef7;--bg:#f5f7fb;--card:#fff;--text1:#1f2937;--text2:#6b7280;--text3:#94a3b8;--border:#dbe3f0;--bg3:#f3f6fc;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b}*{box-sizing:border-box}body{margin:0;font-family:Inter,Arial,sans-serif;background:var(--bg);color:var(--text1)}.topbar{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:5}.page{padding:16px;max-width:1200px;margin:0 auto}.btn{border:none;border-radius:10px;padding:10px 14px;cursor:pointer}.btn-primary{background:linear-gradient(90deg,#5b8cff,#6c63ff);color:#fff}.btn-ghost{background:#fff;border:1px solid var(--border)}.btn-secondary{background:#eef3ff;color:#345}.btn-danger{background:#fee2e2;color:#b91c1c}.btn-sm{padding:6px 10px;font-size:12px}.btn-icon{padding:6px 9px}.stats-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin:14px 0}.stat-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:14px}.stat-value{font-size:24px;font-weight:700}.stat-label{font-size:13px;color:var(--text2);margin-top:4px}.filters-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}.filter,.form-control{padding:10px 12px;border:1px solid var(--border);border-radius:10px;background:#fff;width:100%}.table-wrap,.mobile-cards{background:#fff;border:1px solid var(--border);border-radius:14px;overflow:hidden}.table-wrap{overflow:auto}table{width:100%;border-collapse:collapse}th,td{padding:12px;border-bottom:1px solid #eef2f7;text-align:left;font-size:13px}th{background:#f8fafc;color:#475569}.actions{display:flex;gap:6px;justify-content:flex-end}.badge{display:inline-flex;align-items:center;padding:5px 10px;border-radius:999px;font-size:11px;font-weight:600}.badge-pending{background:#fff7ed;color:#c2410c}.badge-delivered{background:#ecfdf5;color:#15803d}.badge-delayed{background:#fef2f2;color:#b91c1c}.badge-mode{background:#eef2ff;color:#4338ca}.ship-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:12px;margin-bottom:10px}.ship-card-head,.ship-card-foot{display:flex;justify-content:space-between;align-items:center;gap:8px}.ship-card-body{display:grid;margin-top:12px}.ship-ref{font-weight:700}.ship-sub{font-size:12px;color:var(--text2)}.ship-field-label{font-size:11px;color:var(--text2)}.ship-field-value{font-size:13px;font-weight:600}.ship-actions{display:flex;gap:6px;flex-wrap:wrap}.overlay{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:flex-end;justify-content:center;z-index:20}.overlay.open{display:flex}.modal{background:#fff;width:min(760px,100%);border-radius:18px 18px 0 0;max-height:92vh;overflow:auto}.modal-head,.modal-foot{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}.modal-foot{border-top:1px solid var(--border);border-bottom:none;gap:10px;position:sticky;bottom:0;background:#fff}.modal-body{padding:16px}.modal-title{font-size:18px;font-weight:700}.modal-close{background:none;border:none;font-size:20px;cursor:pointer}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.full{grid-column:1/-1}.toast-wrap{position:fixed;right:16px;bottom:16px;display:flex;flex-direction:column;gap:8px;z-index:40}.toast{background:#111827;color:#fff;padding:10px 12px;border-radius:10px;box-shadow:0 10px 25px rgba(0,0,0,.18)}.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.5);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;vertical-align:-2px}@keyframes spin{to{transform:rotate(360deg)}}@media (max-width:900px){.stats-grid{grid-template-columns:repeat(2,1fr)}.desktop-table{display:none}}@media (min-width:901px){.mobile-cards{display:none}}</style></head><body><div class="topbar"><div><div style="font-weight:800">FreightTrack Pro</div><div style="font-size:12px;color:var(--text2)">Quotation module stable build</div></div><button class="btn btn-primary" onclick="openNewQuotation()"><i class="fa fa-plus"></i> New Quotation</button></div><div class="page"><div class="stats-grid"><div class="stat-card"><div class="stat-value" id="q-total">0</div><div class="stat-label">Total</div></div><div class="stat-card"><div class="stat-value" id="q-pending">0</div><div class="stat-label">Pending</div></div><div class="stat-card"><div class="stat-value" id="q-approved">0</div><div class="stat-label">Approved</div></div><div class="stat-card"><div class="stat-value" id="q-declined">0</div><div class="stat-label">Declined</div></div><div class="stat-card"><div class="stat-value" id="q-transit">0</div><div class="stat-label">In Transit</div></div><div class="stat-card"><div class="stat-value" id="q-ocean">0</div><div class="stat-label">Ocean</div></div></div><div class="filters-row"><input id="global-search" class="filter" placeholder="Search ref, client, POL, POD" oninput="loadQuotations()" style="min-width:240px;flex:1"><select class="filter" id="qfil-status" onchange="loadQuotations()"><option value="">All Status</option><option>Pending</option><option>Approved</option><option>Declined</option></select><select class="filter" id="qfil-mode" onchange="loadQuotations()"><option value="">All Modes</option><option>Ocean</option><option>Air</option></select></div><div id="q-count-label" style="font-size:12px;color:var(--text2);margin-bottom:8px"></div><div class="mobile-cards" id="quotes-cards"></div><div class="desktop-table table-wrap"><div id="quotes-table"></div></div><div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px"><button class="btn btn-secondary btn-sm" id="qpg-prev" onclick="qPagePrev()"><i class="fa fa-chevron-left"></i></button><div id="qpg-info" style="font-size:12px;color:var(--text2)">Page 1/1</div><button class="btn btn-secondary btn-sm" id="qpg-next" onclick="qPageNext()"><i class="fa fa-chevron-right"></i></button></div></div><div class="overlay" id="modal-quotation"><div class="modal"><div class="modal-head"><div class="modal-title" id="modal-quotation-title">New Quotation</div><button class="modal-close" onclick="closeModal('modal-quotation')"><i class="fa fa-xmark"></i></button></div><div class="modal-body"><div class="form-grid"><div><label>Quotation Ref *</label><input id="qf-ref" class="form-control" readonly></div><div><label>Mode</label><select id="qf-mode" class="form-control"><option>Ocean</option><option>Air</option></select></div><div><label>Client</label><input id="qf-client" class="form-control"></div><div><label>Client Email</label><input id="qf-email" class="form-control" type="email"></div><div><label>Carrier</label><input id="qf-carrier" class="form-control"></div><div><label>Incoterm 2020</label><select id="qf-incoterm" class="form-control"><option value="">Select</option><option>EXW</option><option>FCA</option><option>CPT</option><option>CIP</option><option>DAP</option><option>DPU</option><option>DDP</option><option>FAS</option><option>FOB</option><option>CFR</option><option>CIF</option></select></div><div><label>POL</label><input id="qf-pol" class="form-control"></div><div><label>POD</label><input id="qf-pod" class="form-control"></div><div><label>Validity Date</label><input id="qf-validity" class="form-control" type="date"></div><div><label>Currency</label><select id="qf-currency" class="form-control"><option>USD</option><option>EUR</option><option>GBP</option><option>MAD</option><option>CNY</option></select></div><div><label>Status</label><select id="qf-status" class="form-control"><option>Pending</option><option>Approved</option><option>Declined</option></select></div><div class="full"><label>Notes</label><textarea id="qf-note" class="form-control"></textarea></div></div><div style="margin-top:18px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px"><div style="font-size:13px;font-weight:700">Containers</div><span id="qcont-teu-badge" style="font-size:11px;color:var(--accent);font-weight:700;display:none"></span></div><div style="display:flex;gap:8px;margin-bottom:8px"><input id="qcont-qty" class="form-control" type="number" min="1" max="99" placeholder="Qty" style="width:80px;flex-shrink:0"><select id="qcont-type" class="form-control"><option value="">Type</option><option value="20GP">20GP (1 TEU)</option><option value="40GP">40GP (2 TEU)</option><option value="40HC">40HC (2 TEU)</option><option value="40RF">40RF (2 TEU)</option><option value="20RF">20RF (1 TEU)</option><option value="45HC">45HC (2 TEU)</option></select><button type="button" class="btn btn-primary btn-sm" onclick="qAddContainer()"><i class="fa fa-plus"></i> Add</button></div><div id="qcont-list" style="display:flex;flex-direction:column;gap:6px"></div></div><div style="margin-top:18px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px;flex-wrap:wrap"><div style="font-size:13px;font-weight:700">Charges</div><div style="display:flex;gap:6px;flex-wrap:wrap"><button type="button" class="btn btn-ghost btn-sm" onclick="qAddCharge('Freight')">+ Freight</button><button type="button" class="btn btn-ghost btn-sm" onclick="qAddCharge('THC Origin')">+ THC Orig</button><button type="button" class="btn btn-ghost btn-sm" onclick="qAddCharge('THC Dest')">+ THC Dest</button><button type="button" class="btn btn-ghost btn-sm" onclick="qAddCharge('BL Fee')">+ BL</button><button type="button" class="btn btn-ghost btn-sm" onclick="qAddCharge('Customs')">+ Customs</button><button type="button" class="btn btn-ghost btn-sm" onclick="qAddCharge('')">+ Other</button></div></div><div id="qcharges-list" style="display:flex;flex-direction:column;gap:6px"></div><div id="qcharges-total" style="display:none;margin-top:10px;padding:10px 14px;background:var(--bg3);border-radius:10px;justify-content:flex-end;gap:24px;font-size:13px;font-weight:600"></div></div></div><div class="modal-foot"><button class="btn btn-ghost" style="flex:1" onclick="closeModal('modal-quotation')">Cancel</button><button class="btn btn-primary" style="flex:2" id="qbtn-save" onclick="saveQuotation()"><i class="fa fa-floppy-disk"></i> Save Quotation</button></div></div></div><div class="overlay" id="modal-qaction"><div class="modal" style="max-width:420px"><div class="modal-head"><div class="modal-title" id="qaction-title">Approve Quotation</div><button class="modal-close" onclick="closeModal('modal-qaction')"><i class="fa fa-xmark"></i></button></div><div class="modal-body"><p id="qaction-msg" style="font-size:14px;color:var(--text2)"></p><textarea id="qaction-note" class="form-control" rows="3" placeholder="Optional note"></textarea></div><div class="modal-foot"><button class="btn btn-ghost" style="flex:1" onclick="closeModal('modal-qaction')">Cancel</button><button class="btn btn-primary" style="flex:2" onclick="confirmQAction()">Confirm</button></div></div></div><div class="toast-wrap" id="toast-wrap"></div><script>let qPage=1,qPageSize=20,qRows=[];let qEditId=null,qActionId=null,qActionType='approve';let qContainers=[],qCharges=[];const TEU_MAP={"20GP":1,"20RF":1,"40GP":2,"40HC":2,"40RF":2,"45HC":2};function fmtD(d){return d||''}function toast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;document.getElementById('toast-wrap').appendChild(t);setTimeout(()=>t.remove(),3500)}function openModal(id){document.getElementById(id).classList.add('open');document.body.style.overflow='hidden'}function closeModal(id){document.getElementById(id).classList.remove('open');document.body.style.overflow=''}function qStatusBadge(s){const m={Pending:'pending',Approved:'delivered',Declined:'delayed'};return `<span class="badge badge-${m[s]||'pending'}">${s||'Pending'}</span>`}function qModeBadge(m){return `<span class="badge badge-mode">${m||'Ocean'}</span>`}async function apiFetch(url,options={}){const h={'Content-Type':'application/json','Accept':'application/json'};let res;try{res=await fetch(url,{...options,headers:{...h,...(options.headers||{})}})}catch(e){throw new Error('Network error: '+e.message)}if(!res.ok){let msg=`HTTP ${res.status}`;try{const b=await res.json();msg=b.detail||b.message||JSON.stringify(b)}catch(e){try{const t=await res.text();if(t)msg=t}catch(e2){}}throw new Error(msg)}const txt=await res.text();return txt?JSON.parse(txt):null}function qRenderContainers(){const wrap=document.getElementById('qcont-list');if(!qContainers.length){wrap.innerHTML='<div style="font-size:12px;color:var(--text3);padding:4px 0">No containers added yet.</div>';document.getElementById('qcont-teu-badge').style.display='none';return}let total=0;wrap.innerHTML=qContainers.map((c,i)=>{const teu=(TEU_MAP[c.ctype]||0)*c.qty;total+=teu;return `<div style="display:flex;align-items:center;gap:8px;background:var(--bg3);padding:8px 12px;border-radius:8px"><span style="font-size:13px;font-weight:600;color:var(--text1);flex:1">${c.qty}x ${c.ctype}</span><span style="font-size:11px;color:var(--text2)">${teu} TEU</span><button type="button" class="btn btn-danger btn-sm btn-icon" onclick="qRemoveContainer(${i})"><i class="fa fa-trash"></i></button></div>`}).join('');const b=document.getElementById('qcont-teu-badge');b.style.display='inline';b.textContent=`Total: ${total} TEU`}function qAddContainer(){const qty=parseInt(document.getElementById('qcont-qty').value,10);const ctype=document.getElementById('qcont-type').value;if(!qty||!ctype){toast('Select quantity and type');return}qContainers.push({qty,ctype});document.getElementById('qcont-qty').value='';document.getElementById('qcont-type').value='';qRenderContainers()}function qRemoveContainer(i){qContainers.splice(i,1);qRenderContainers()}function qRenderCharges(){const wrap=document.getElementById('qcharges-list');if(!qCharges.length){wrap.innerHTML='<div style="font-size:12px;color:var(--text3);padding:4px 0">No charges added yet. Use the buttons above to add.</div>';document.getElementById('qcharges-total').style.display='none';return}wrap.innerHTML=qCharges.map((c,i)=>`<div style="display:grid;grid-template-columns:2fr 1fr 1fr 1.5fr auto;gap:6px;align-items:center;background:var(--bg3);padding:8px 10px;border-radius:8px"><input class="form-control" style="font-size:12px;padding:5px 8px" placeholder="Charge name" value="${c.name}" oninput="qCharges[${i}].name=this.value"><input class="form-control" style="font-size:12px;padding:5px 8px" placeholder="Amount" type="number" min="0" step="0.01" value="${c.amount}" oninput="qCharges[${i}].amount=this.value;qUpdateTotal()"><select class="form-control" style="font-size:12px;padding:5px 8px" onchange="qCharges[${i}].currency=this.value;qUpdateTotal()">${['USD','EUR','GBP','MAD','CNY'].map(cu=>`<option ${c.currency===cu?'selected':''}>${cu}</option>`).join('')}</select><select class="form-control" style="font-size:12px;padding:5px 8px" onchange="qCharges[${i}].unit=this.value">${['Per BL','Per Container','Lump Sum','Per KG','Per CBM'].map(u=>`<option ${c.unit===u?'selected':''}>${u}</option>`).join('')}</select><button type="button" class="btn btn-danger btn-sm btn-icon" onclick="qRemoveCharge(${i})"><i class="fa fa-trash"></i></button></div>`).join('');qUpdateTotal()}function qAddCharge(name){qCharges.push({name:name,amount:'',currency:document.getElementById('qf-currency').value||'USD',unit:'Per BL',note:''});qRenderCharges()}function qRemoveCharge(i){qCharges.splice(i,1);qRenderCharges()}function qUpdateTotal(){const totals={};qCharges.forEach(c=>{const amt=parseFloat(c.amount);if(!isNaN(amt)&&amt>0)totals[c.currency]=(totals[c.currency]||0)+amt});const wrap=document.getElementById('qcharges-total');const keys=Object.keys(totals);if(!keys.length){wrap.style.display='none';return}wrap.style.display='flex';wrap.innerHTML='<span style="color:var(--text2);font-weight:500;margin-right:8px">Total:</span>'+keys.map(k=>`<span style="color:var(--accent)">${totals[k].toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})} ${k}</span>`).join('<span style="color:var(--text3);margin:0 4px">+</span>')}async function loadNextQuotationRef(){try{const r=await apiFetch('/api/quotations/next-ref');document.getElementById('qf-ref').value=r.ref||''}catch(e){toast(e.message)}}async function openNewQuotation(){qEditId=null;qContainers=[];qCharges=[];qRenderContainers();qRenderCharges();document.getElementById('modal-quotation-title').textContent='New Quotation';['qf-ref','qf-client','qf-email','qf-carrier','qf-pol','qf-pod','qf-validity','qf-note'].forEach(id=>document.getElementById(id).value='');document.getElementById('qf-mode').value='Ocean';document.getElementById('qf-status').value='Pending';document.getElementById('qf-incoterm').value='';document.getElementById('qf-currency').value='USD';await loadNextQuotationRef();openModal('modal-quotation')}async function saveQuotation(){let ref=document.getElementById('qf-ref').value.trim();if(!ref){await loadNextQuotationRef();ref=document.getElementById('qf-ref').value.trim()}if(!ref){toast('Unable to generate quotation ref');return}const btn=document.getElementById('qbtn-save');btn.innerHTML='<span class="spinner"></span> Saving';btn.disabled=true;const data={ref,client:document.getElementById('qf-client').value.trim(),clientemail:document.getElementById('qf-email').value.trim(),carrier:document.getElementById('qf-carrier').value.trim(),pol:document.getElementById('qf-pol').value.trim(),pod:document.getElementById('qf-pod').value.trim(),note:document.getElementById('qf-note').value.trim(),validitydate:document.getElementById('qf-validity').value,mode:document.getElementById('qf-mode').value||'Ocean',status:document.getElementById('qf-status').value||'Pending',incoterm:document.getElementById('qf-incoterm').value||null,currency:document.getElementById('qf-currency').value||'USD',containers:qContainers.filter(c=>c.qty&&c.ctype),charges:qCharges.filter(c=>c.name)};try{if(qEditId)await apiFetch(`/api/quotations/${qEditId}`,{method:'PATCH',body:JSON.stringify(data)});else await apiFetch('/api/quotations',{method:'POST',body:JSON.stringify(data)});toast(qEditId?'Quotation updated':'Quotation created');closeModal('modal-quotation');loadQuotations()}catch(e){toast(e.message);console.error(e)}btn.innerHTML='<i class="fa fa-floppy-disk"></i> Save Quotation';btn.disabled=false}async function editQuotation(id){qEditId=id;try{const s=await apiFetch(`/api/quotations/${id}`);document.getElementById('modal-quotation-title').textContent='Edit Quotation';document.getElementById('qf-ref').value=s.ref||'';document.getElementById('qf-client').value=s.client||'';document.getElementById('qf-email').value=s.clientemail||'';document.getElementById('qf-carrier').value=s.carrier||'';document.getElementById('qf-pol').value=s.pol||'';document.getElementById('qf-pod').value=s.pod||'';document.getElementById('qf-validity').value=s.validitydate||'';document.getElementById('qf-note').value=s.note||'';document.getElementById('qf-mode').value=s.mode||'Ocean';document.getElementById('qf-status').value=s.status||'Pending';document.getElementById('qf-incoterm').value=s.incoterm||'';document.getElementById('qf-currency').value=s.currency||'USD';qContainers=(s.containers||[]).map(c=>({qty:c.qty,ctype:c.ctype}));qCharges=(s.charges||[]).map(c=>({name:c.name,amount:c.amount||'',currency:c.currency||'USD',unit:c.unit||'Per BL',note:c.note||''}));qRenderContainers();qRenderCharges();openModal('modal-quotation')}catch(e){toast(e.message)}}async function deleteQuotation(id){if(!confirm('Delete this quotation?'))return;try{await apiFetch(`/api/quotations/${id}`,{method:'DELETE'});toast('Deleted');loadQuotations()}catch(e){toast(e.message)}}function qSliceRows(){const pages=Math.max(1,Math.ceil(qRows.length/qPageSize));if(qPage>pages)qPage=pages;const start=(qPage-1)*qPageSize;return {pages,rows:qRows.slice(start,start+qPageSize)}}function qPagePrev(){qPage=Math.max(1,qPage-1);renderQuotations()}function qPageNext(){const pages=Math.max(1,Math.ceil(qRows.length/qPageSize));qPage=Math.min(pages,qPage+1);renderQuotations()}function openQAction(id,type){qActionId=id;qActionType=type;document.getElementById('qaction-title').textContent=type==='approve'?'Approve Quotation':'Decline Quotation';document.getElementById('qaction-msg').textContent=type==='approve'?'Approve this quotation?':'Decline this quotation?';document.getElementById('qaction-note').value='';openModal('modal-qaction')}async function confirmQAction(){const note=document.getElementById('qaction-note').value.trim();const newStatus=qActionType==='approve'?'Approved':'Declined';try{await apiFetch(`/api/quotations/${qActionId}`,{method:'PATCH',body:JSON.stringify({status:newStatus,note:note||undefined})});closeModal('modal-qaction');toast(`Quotation ${newStatus.toLowerCase()}`);loadQuotations()}catch(e){toast(e.message)}}function _qActionBtns(s){const canApprove=s.status==='Pending';const canDecline=s.status==='Pending'||s.status==='Approved';return `${canApprove?`<button class="btn btn-sm" style="background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3);font-size:11px;padding:4px 10px" onclick="event.stopPropagation();openQAction(${s.id},'approve')"><i class="fa fa-circle-check"></i> Approve</button>`:''}${canDecline?`<button class="btn btn-sm" style="background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.2);font-size:11px;padding:4px 10px" onclick="event.stopPropagation();openQAction(${s.id},'decline')"><i class="fa fa-circle-xmark"></i> Decline</button>`:''}<button class="btn btn-secondary btn-sm btn-icon" onclick="event.stopPropagation();downloadQuotationPDF(${s.id})"><i class="fa fa-file-pdf"></i></button><button class="btn btn-secondary btn-sm btn-icon" onclick="event.stopPropagation();editQuotation(${s.id})"><i class="fa fa-pen"></i></button><button class="btn btn-danger btn-sm btn-icon" onclick="event.stopPropagation();deleteQuotation(${s.id})"><i class="fa fa-trash"></i></button>`}async function downloadQuotationPDF(id){try{const res=await fetch(`/api/quotations/${id}/pdf`);if(!res.ok)throw new Error('PDF download failed');const blob=await res.blob();const url=window.URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`quotation_${id}.pdf`;document.body.appendChild(a);a.click();document.body.removeChild(a);window.URL.revokeObjectURL(url)}catch(e){toast(e.message)}}function renderQuotations(){const wrap=document.getElementById('quotes-table');const cards=document.getElementById('quotes-cards');const {pages,rows}=qSliceRows();document.getElementById('q-count-label').textContent=`${qRows.length} quotation${qRows.length!==1?'s':''}`;document.getElementById('qpg-info').textContent=`Page ${qPage}/${pages}`;document.getElementById('qpg-prev').disabled=qPage<=1;document.getElementById('qpg-next').disabled=qPage>=pages;cards.innerHTML=!rows.length?'<div class="ship-card">No quotations</div>':rows.map(s=>`<div class="ship-card" onclick="editQuotation(${s.id})"><div class="ship-card-head"><div><div class="ship-ref">${s.ref||''}</div><div class="ship-sub">${s.client||''}</div></div>${qStatusBadge(s.status)}</div><div class="ship-card-body" style="grid-template-columns:repeat(2,1fr);gap:12px"><div><div class="ship-field-label">POL</div><div class="ship-field-value">${s.pol||''}</div></div><div><div class="ship-field-label">POD</div><div class="ship-field-value">${s.pod||''}</div></div><div><div class="ship-field-label">Validity</div><div class="ship-field-value">${fmtD(s.validitydate)}</div></div><div><div class="ship-field-label">Currency</div><div class="ship-field-value">${s.currency||'USD'}</div></div></div><div class="ship-card-foot"><div>${qModeBadge(s.mode)}</div><div class="ship-actions" onclick="event.stopPropagation()">${_qActionBtns(s)}</div></div></div>`).join('');wrap.innerHTML=!rows.length?'<div style="padding:14px">No quotations</div>':`<table><thead><tr><th>Ref</th><th>Client</th><th>Mode</th><th>POL</th><th>POD</th><th>Validity</th><th>Currency</th><th>Status</th><th></th></tr></thead><tbody>${rows.map(s=>`<tr onclick="editQuotation(${s.id})" style="cursor:pointer"><td>${s.ref||''}</td><td>${s.client||''}</td><td>${s.mode||'Ocean'}</td><td>${s.pol||''}</td><td>${s.pod||''}</td><td>${fmtD(s.validitydate)}</td><td>${s.currency||'USD'}</td><td>${qStatusBadge(s.status)}</td><td><div class="actions" onclick="event.stopPropagation()">${_qActionBtns(s)}</div></td></tr>`).join('')}</tbody></table>`}async function loadQuotations(){try{const status=document.getElementById('qfil-status').value||'';const mode=document.getElementById('qfil-mode').value||'';const q=document.getElementById('global-search').value||'';qRows=await apiFetch(`/api/quotations?status=${encodeURIComponent(status)}&mode=${encodeURIComponent(mode)}&q=${encodeURIComponent(q)}`)||[];qPage=1;renderQuotations();const bs={};qRows.forEach(x=>bs[x.status]=(bs[x.status]||0)+1);document.getElementById('q-total').textContent=qRows.length;document.getElementById('q-pending').textContent=bs['Pending']||0;document.getElementById('q-approved').textContent=bs['Approved']||0;document.getElementById('q-declined').textContent=bs['Declined']||0;document.getElementById('q-transit').textContent=0;document.getElementById('q-ocean').textContent=qRows.filter(x=>(x.mode||'Ocean')==='Ocean').length}catch(e){toast(e.message);console.error(e)}}loadQuotations();</script></body></html>
